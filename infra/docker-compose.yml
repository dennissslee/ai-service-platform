name: ${COMPOSE_PROJECT_NAME:-ai-platform}

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - portal
      - new-api
      - sub2api
      - litellm
      - open-webui
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      PORTAL_DOMAIN: ${PORTAL_DOMAIN}
      NEW_API_DOMAIN: ${NEW_API_DOMAIN}
      SUB2API_DOMAIN: ${SUB2API_DOMAIN}
      LITELLM_DOMAIN: ${LITELLM_DOMAIN}
      OPEN_WEBUI_DOMAIN: ${OPEN_WEBUI_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public

  portal:
    image: ${PORTAL_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    environment:
      NEW_API_DOMAIN: ${NEW_API_DOMAIN}
      SUB2API_DOMAIN: ${SUB2API_DOMAIN}
      LITELLM_DOMAIN: ${LITELLM_DOMAIN}
      OPEN_WEBUI_DOMAIN: ${OPEN_WEBUI_DOMAIN}
    expose:
      - "80"
    ports:
      - "${PORTAL_PORT:-8080}:80"
    volumes:
      - ./portal/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./portal:/usr/share/caddy:ro
    networks:
      - public

  new-api:
    image: ${NEW_API_IMAGE:-calciumion/new-api:latest}
    restart: unless-stopped
    depends_on:
      postgres-new-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "${NEW_API_PORT:-3000}:3000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SQL_DSN: ${NEW_API_SQL_DSN}
      REDIS_CONN_STRING: ${NEW_API_REDIS_CONN_STRING}
      SESSION_SECRET: ${NEW_API_SESSION_SECRET}
      FRONTEND_BASE_URL: ${NEW_API_FRONTEND_BASE_URL}
    volumes:
      - new_api_data:/data
    networks:
      - public
      - internal

  sub2api:
    image: ${SUB2API_IMAGE:-weishaw/sub2api:latest}
    restart: unless-stopped
    depends_on:
      postgres-sub2api:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "443"
      - "8080"
    ports:
      - "${SUB2API_PORT:-3001}:443"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PORT: "8080"
      GIN_MODE: ${SUB2API_GIN_MODE:-release}
      BASE_URL: ${SUB2API_BASE_URL}
      DATABASE_URL: ${SUB2API_DATABASE_URL}
      REDIS_URL: ${SUB2API_REDIS_URL}
    volumes:
      - sub2api_data:/data
    networks:
      - public
      - internal

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-latest}
    restart: unless-stopped
    depends_on:
      postgres-litellm:
        condition: service_healthy
    command: ["--port", "4000", "--num_workers", "4"]
    expose:
      - "4000"
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_URL: ${LITELLM_DATABASE_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      UI_USERNAME: ${LITELLM_UI_USERNAME}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD}
      STORE_MODEL_IN_DB: "True"
    volumes:
      - litellm_data:/app/data
    networks:
      - public
      - internal

  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    restart: unless-stopped
    depends_on:
      - litellm
    expose:
      - "8080"
    ports:
      - "${OPEN_WEBUI_PORT:-8081}:8080"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      WEBUI_NAME: ${OPEN_WEBUI_NAME}
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL}
      OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - public

  postgres-new-api:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEW_API_POSTGRES_DB}
      POSTGRES_USER: ${NEW_API_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NEW_API_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - new_api_postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  postgres-litellm:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LITELLM_POSTGRES_DB}
      POSTGRES_USER: ${LITELLM_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  postgres-sub2api:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SUB2API_POSTGRES_DB}
      POSTGRES_USER: ${SUB2API_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SUB2API_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sub2api_postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  new_api_postgres_data:
  litellm_postgres_data:
  sub2api_postgres_data:
  redis_data:
  new_api_data:
  sub2api_data:
  litellm_data:
  open_webui_data:
